<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tunary — Loading Concept</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Syne:wght@400;600&display=swap" rel="stylesheet" />
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: { display: ['Orbitron', 'sans-serif'], body: ['Syne', 'sans-serif'] },
          colors: { 
            bg: '#0d0714', 
            surface: '#180d26', 
            mint: '#3aff93', 
            violet: '#8a2be2',
            border: '#2a1744' 
          },
        }
      }
    }
  </script>
  <style>
    body::before {
      content: ''; position: fixed; inset: 0;
      background-image: linear-gradient(rgba(138,43,226,0.04) 1px, transparent 1px), linear-gradient(90deg, rgba(138,43,226,0.04) 1px, transparent 1px);
      background-size: 60px 60px; pointer-events: none;
    }
    @keyframes pulseGlow { 0%, 100% { opacity: 0.15; transform: scale(1); } 50% { opacity: 0.4; transform: scale(1.05); } }
    .bg-glow { animation: pulseGlow 4s ease-in-out infinite; }
  </style>
</head>
<body class="bg-bg text-gray-300 font-body min-h-screen flex flex-col items-center justify-center relative overflow-hidden px-6">

  <!-- Double Halo d'ambiance pour matcher le logo (Menthe à gauche, Violet à droite) -->
  <div class="absolute top-1/2 left-1/3 -translate-x-1/2 -translate-y-1/2 w-[400px] h-[400px] rounded-full blur-[100px] bg-mint/20 bg-glow pointer-events-none"></div>
  <div class="absolute top-1/2 right-1/3 translate-x-1/2 -translate-y-1/2 w-[400px] h-[400px] rounded-full blur-[100px] bg-violet/20 bg-glow pointer-events-none" style="animation-delay: 2s"></div>

  <div class="relative z-10 text-center max-w-lg mx-auto">
    
    <!-- Le vrai logo Tunary -->
    <img src="assets/images/tunarylogo.png" alt="Tunary Logo" class="w-72 md:w-96 mx-auto mb-8 drop-shadow-[0_0_20px_rgba(58,255,147,0.15)] animate-pulse" style="animation-duration: 4s">

    <p class="font-display text-xs text-mint tracking-[0.3em] uppercase font-bold mb-6">
      LOADING CONCEPT
    </p>

    <!-- Texte énigmatique -->
    <p class="text-sm text-gray-400 leading-relaxed mb-10 max-w-sm mx-auto">
      Quelque chose de grand se prépare en coulisses. L'infrastructure se déploie dans l'ombre. Restez connectés.
    </p>

    <!-- Bouton retour -->
    <a href="index.html" 
       class="inline-flex items-center gap-2 font-display text-xs tracking-widest text-gray-400 border border-border px-5 py-3 rounded-sm hover:border-violet hover:text-white transition-all duration-300 bg-surface/50">
      ← Retour au portfolio
    </a>
  </div>

</body>
</html>
